<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WebPrime</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 0.25em;
      background: linear-gradient(135deg, #e91e63, #9c27b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p.subtitle {
      color: #888;
      margin-bottom: 3rem;
      font-size: 1.1rem;
    }
    .cards {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 280px;
      text-decoration: none;
      color: #fff;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: #e91e63;
      transform: translateY(-2px);
    }
    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
    }
    .card .icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    .card p {
      color: #888;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .card .tag {
      display: inline-block;
      background: #e91e63;
      color: #fff;
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card.nx .tag { background: #9c27b0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>WebPrime</h1>
    <p class="subtitle">Pump It Up Prime Web Visualizer</p>
    <div class="cards">
      <a href="ucs.html" class="card">
        <div class="icon">&#x1f3b5;</div>
        <h2>UCS Visualizer</h2>
        <p>Load and visualize UCS charts with step timing, combo tracking, and BPM changes.</p>
        <span class="tag">CS131</span>
      </a>
      <a href="nx.html" class="card nx">
        <div class="icon">&#x1f3ae;</div>
        <h2>NX JPAK Visualizer</h2>
        <p>Load JPAK-packed NX charts with HD skins, note skins, and WebGL backgrounds.</p>
        <span class="tag">1308</span>
      </a>
    </div>
  </div>
</body>
</html>
